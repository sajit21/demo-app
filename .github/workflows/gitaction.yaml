name: Flask CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      # 4. Run tests
      - name: Run tests
        run: |
          cd app
          python -m unittest discover

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          cd app
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} .

      # 7. Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }}

      # 8. Print image info (for debugging/logs)
      - name: Show image tag
        run: |
          echo "Image pushed: ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }}"
