name: Flask CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout application code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      # 4. Run tests
      - name: Run tests
        run: |
          cd app
          python -m unittest discover

      # 5. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build image
      - name: Build Docker image
        run: |
          cd app

          IMAGE_TAG=${GITHUB_SHA}

          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG} \
            .

      # 7. Push image
      - name: Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          docker push \
            ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG}

      # 8. Get image digest
      - name: Get image digest
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/flask-app:${GITHUB_SHA}

          DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' \
            "$IMAGE")

          echo "DIGEST=$DIGEST" >> $GITHUB_ENV

          echo "Digest:"
          echo "$DIGEST"

      # 9. Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # 10. Sign image using digest
      - name: Sign Docker image
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign \
            --key env://COSIGN_KEY \
            --yes \
            "$DIGEST"

      # 11. Print image info
      - name: Show image info
        run: |
          echo "Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/flask-app:${GITHUB_SHA}"

          echo ""
          echo "Digest:"
          echo "$DIGEST"

      # 12. Update Helm repository
      - name: Update Helm repo
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone \
            https://x-access-token:${GITHUB_TOKEN}@github.com/sajit21/demo-app-helm.git

          cd demo-app-helm

          yq e '.image.tag = strenv(IMAGE_TAG)' \
            -i values.yaml

          git config user.name "github-actions"

          git config user.email \
            "github-actions@github.com"

          git add values.yaml

          git commit \
            -m "update image tag to ${IMAGE_TAG}" \
            || echo "No changes"

          git push
