name: Flask CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      # 4. Run tests
      - name: Run tests
        run: |
          cd app
          python -m unittest discover

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          cd app
          IMAGE_TAG=${GITHUB_SHA}
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG} .

      # 7. Push Docker image
      - name: Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG}

      # 8. Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # 9. Sign Docker image
      - name: Sign image
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: {{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          cosign sign \
            --key env://COSIGN_KEY \
            ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG}

      # 10. Print image info
      - name: Show image tag
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          echo "Image pushed: ${{ secrets.DOCKER_USERNAME }}/flask-app:${IMAGE_TAG}"

      # 11. Update Helm repo
      - name: Update Helm repo
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          git clone https://github.com/sajit21/demo-app-helm.git
          cd demo-app-helm

          yq e '.image.tag = strenv(IMAGE_TAG)' -i values.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add values.yaml
          git commit -m "update image tag to ${IMAGE_TAG}"
          git push
